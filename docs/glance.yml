pages:
  - name: Start 
    # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
    # hide-desktop-navigation: true
    columns:
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday
          - type: clock
          - type: server-stats
            servers:
              - type: local
                name: Services
          - type: rss
            style: vertical-list
            collapse-after: 7
            cache: 8h
            feeds:
              - url: https://fmhy.net/feed.rss
                title: fmhy
      - size: full
        widgets:
          - type: search
            search-engine: google
          - type: split-column
            widgets:
              - type: rss
                style: vertical-list
                collapse-after: 7
                cache: 4h
                feeds:
                  - url: https://mshibanami.github.io/GitHubTrendingRSS/daily/all.xml
                    title: github trending
              - type: rss
                style: vertical-list
                collapse-after: 7
                cache: 4h
                feeds:
                  - url: http://172.18.0.2:1200/v2ex/topics/hot
                    title: v2ex hot
          - type: split-column
            widgets:
              - type: rss
                title: Cheap Flights (HKG)
                style: vertical-list
                collapse-after: 7
                cache: 2h
                feeds:
                  - url: https://www.secretflying.com/?s=hong+kong&feed=rss2
                    title: SecretFlying
              - type: rss
                title: 深圳出发特价机票
                style: vertical-list
                collapse-after: 7
                cache: 2h
                feeds:
                  - url: http://szx-rss:8082/rss
                    title: SZX国内特价
      - size: small
        widgets:
          - type: hacker-news


                
theme:
  background-color: 100 20 10
  primary-color: 40 90 40
  contrast-multiplier: 1.1
  disable-picker: false
  presets:
    gruvbox-dark:
      background-color: 0 0 16
      primary-color: 43 59 81
      positive-color: 61 66 44
      negative-color: 6 96 59
    zebra:
      light: true
      background-color: 0 0 95
      primary-color: 0 0 10
      negative-color: 0 90 50
    peachy:
      light: true
      background-color: 28 40 77
      primary-color: 155 100 20
      negative-color: 0 100 60
      contrast-multiplier: 1.1
      text-saturation-multiplier: 0.5
    drcula:
      background-color: 231 15 21
      primary-color: 265 89 79
      contrast-multiplier: 1.2
      positive-color: 135 94 66
      negative-color: 0 100 67