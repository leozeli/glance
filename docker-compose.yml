services:
  glance:
    build: .
    ports:
      - "127.0.0.1:4000:8080"
    volumes:
      - ./docs/glance.yml:/app/config/glance.yml:ro
    depends_on:
      - szx-rss
    restart: unless-stopped
    networks:
      - 1panel-network

  szx-rss:
    image: python:3.11-alpine
    command: python3 /app/szx-flights-rss.py 8082
    volumes:
      - ./scripts/szx-flights-rss.py:/app/szx-flights-rss.py:ro
    restart: unless-stopped
    networks:
      - 1panel-network

  wewe-rss:
    image: cooderl/wewe-rss-sqlite:latest
    ports:
      - "0.0.0.0:4001:4000"
    environment:
      - DATABASE_TYPE=sqlite
      - AUTH_CODE=${WEWE_AUTH_CODE}
      - SERVER_ORIGIN_URL=https://wewe.c9c.top
      - FEED_MODE=fulltext
      - CRON_EXPRESSION=35 5,17 * * *
    volumes:
      - wewe-rss-data:/app/data
    restart: unless-stopped
    networks:
      - 1panel-network

volumes:
  wewe-rss-data:

networks:
  1panel-network:
    external: true
